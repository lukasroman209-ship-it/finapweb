<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investičná Lekcia Dňa 🦉</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* Duolingo Farby */
        :root {
            --fin-green-dark: #58a700;
            --fin-green-light: #79c536;
            --fin-blue: #1899e4;
            --fin-bg: #f7f7f7;
            --fin-shadow: rgba(0, 0, 0, 0.1);

            --chart-border-color: #58a700;
            --chart-bg-color: rgba(121, 197, 54, 0.1);
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px 10px;
            background-color: var(--fin-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--fin-shadow);
            box-sizing: border-box;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 20px 0 10px;
            color: var(--fin-green-dark);
            font-size: 1.6em;
            font-weight: bold;
        }

        #result-display {
            background-color: var(--fin-green-light);
            color: white;
            padding: 15px 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 5px 0 var(--fin-green-dark);
        }

        #finalSum {
            font-size: 2.5em;
            display: block;
            margin: 5px 0;
        }

        #result-display small {
            opacity: 0.9;
        }

        /* Sekcia Grafu je teraz pod výsledkom a nad slidermi */
        .chart-area {
            padding: 0 20px 20px;
        }

        #myChart {
            max-height: 250px;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 8px;
        }

        /* Sekcia Sliderov je teraz na konci */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 20px 20px;
        }

        .control-group {
            background-color: #f0f8ff;
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 0 3px 0 rgba(24, 153, 228, 0.3);
            display: flex;
            flex-direction: column;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .label-row label {
            font-weight: bold;
            color: #333;
            font-size: 0.9em;
        }

        .value-display {
            font-size: 1.1em;
            color: var(--fin-blue);
            text-align: right;
            font-weight: bold;
            width: 80px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #e0e0e0;
            margin: 5px 0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--fin-green-dark);
            box-shadow: 0 1px 3px var(--fin-shadow);
            transition: background .15s ease-in-out;
        }
    </style>
</head>

<body>

    <div class="container">

        <div id="header">
            <i class="fas fa-graduation-cap"
                style="color: var(--fin-green-dark); font-size: 1.5em; margin-right: 5px;"></i>
            INVESTIČNÁ LEKCIA DŇA!
        </div>

        <div id="result-display">
            KONIEC LEKCIE!
            <span id="finalSum">0 €</span>
            <small>NAUČIL SI SA ZARÁBAŤ!</small>
        </div>

        <div class="chart-area">
            <canvas id="myChart"></canvas>
        </div>

        <div class="controls">

            <div class="control-group">
                <div class="label-row">
                    <label><i class="far fa-clock"></i> Dĺžka Investície (roky)</label>
                    <div class="value-display" id="lengthValue">10</div>
                </div>
                <input type="range" id="investmentLength" min="1" max="40" value="10" step="1">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label><i class="fas fa-wallet"></i> Mesačná Suma (€)</label>
                    <div class="value-display" id="monthlyValue">100</div>
                </div>
                <input type="range" id="monthlyInvestment" min="10" max="1000" value="100" step="10">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label><i class="fas fa-chart-line"></i> Ročný Výnos (%)</label>
                    <div class="value-display" id="rateValue">7.0</div>
                </div>
                <input type="range" id="annualRate" min="1" max="20" value="7" step="0.5">
            </div>
        </div>

        <div style="padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px;">
            <a href="finap.html" style="text-decoration: none;">
                <button
                    style="width: 100%; padding: 12px; border: none; border-radius: 10px; background-color: #1899e4; color: #fff; font-weight: bold; box-shadow: 0 3px 0 #0f5c8c; cursor: pointer;">
                    📚 Späť na vzdelávacie lekcie
                </button>
            </a>
            <a href="game.html" style="text-decoration: none;">
                <button
                    style="width: 100%; padding: 12px; border: none; border-radius: 10px; background-color: #58a700; color: #fff; font-weight: bold; box-shadow: 0 3px 0 #3a6b00; cursor: pointer;">
                    🎮 Prejsť do finančnej hry
                </button>
            </a>
        </div>

    </div>

    <script>
        // Získanie elementov
        const lengthSlider = document.getElementById('investmentLength');
        const monthlySlider = document.getElementById('monthlyInvestment');
        const rateSlider = document.getElementById('annualRate');

        const lengthValueDisplay = document.getElementById('lengthValue');
        const monthlyValueDisplay = document.getElementById('monthlyValue');
        const rateValueDisplay = document.getElementById('rateValue');
        const finalSumDisplay = document.getElementById('finalSum');

        const ctx = document.getElementById('myChart').getContext('2d');

        let myChart;

        /**
         * Vypočíta priebeh rastu investície (zložené úročenie)
         */
        function calculateGrowth(years, monthlyAmount, annualRate) {
            const monthlyRate = annualRate / 100 / 12;

            let labels = [];
            let data = [];
            let totalValue = 0;

            for (let year = 1; year <= years; year++) {
                // Monthly compounding calculation for each year mark
                const months = year * 12;
                totalValue = monthlyAmount * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) * (1 + monthlyRate);

                // Popisky len každých 5 rokov pre čistotu grafu
                if (year % 5 === 0 || year === 1 || year === years) {
                    labels.push(`Rok ${year}`);
                } else {
                    labels.push('');
                }

                data.push(Math.round(totalValue));
            }

            return { labels, data, finalSum: totalValue };
        }

        /**
         * Aktualizuje celú aplikáciu
         */
        function updateChart() {
            const years = parseInt(lengthSlider.value);
            const monthlyAmount = parseInt(monthlySlider.value);
            const annualRate = parseFloat(rateSlider.value);

            // 1. Aktualizácia zobrazených hodnôt sliderov
            lengthValueDisplay.textContent = `${years}`;
            monthlyValueDisplay.textContent = `${monthlyAmount}`;
            rateValueDisplay.textContent = `${annualRate.toFixed(1)}`;

            // 2. Výpočet dát pre graf
            const { labels, data, finalSum } = calculateGrowth(years, monthlyAmount, annualRate);

            // 3. Aktualizácia konečnej sumy
            finalSumDisplay.textContent = new Intl.NumberFormat('sk-SK', {
                style: 'currency',
                currency: 'EUR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(finalSum);

            // 4. Aktualizácia grafu
            if (myChart) {
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = data;
                myChart.update();
            } else {
                // Inicializácia grafu
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Hodnota (€)',
                            data: data,
                            borderColor: '#58a700',
                            backgroundColor: 'rgba(121, 197, 54, 0.1)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            title: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        if (context.parsed.y !== null) {
                                            return new Intl.NumberFormat('sk-SK', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0 }).format(context.parsed.y);
                                        }
                                        return '';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    display: true,
                                    color: '#eee'
                                },
                                ticks: {
                                    color: '#666',
                                    callback: function (value, index, ticks) {
                                        if (value >= 1000000) {
                                            return (value / 1000000).toFixed(1) + 'M €';
                                        }
                                        if (value >= 1000) {
                                            return (value / 1000).toFixed(0) + 'K €';
                                        }
                                        return value + ' €';
                                    }
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    color: '#666',
                                    maxRotation: 0,
                                    minRotation: 0
                                }
                            }
                        }
                    }
                });
            }
        }

        // Pridanie poslucháčov udalostí
        lengthSlider.addEventListener('input', updateChart);
        monthlySlider.addEventListener('input', updateChart);
        rateSlider.addEventListener('input', updateChart);

        // Inicializácia grafu
        updateChart();
    </script>

</body>

</html>
